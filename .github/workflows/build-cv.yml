name: Build CV

on:
  push:
    branches:
      - main
    paths:
      - "cv/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: en-redacted.tex
          working_directory: cv
          latexmk_use_xelatex: true

      - name: Copy PDF to public directory
        run: |
          mkdir -p public/assets/documents
          cp cv/en-redacted.pdf public/assets/documents/cv.pdf

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code public/assets/documents/cv.pdf || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated CV
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/assets/documents/cv.pdf
          git commit -m "Update CV PDF from LaTeX source [skip ci]"
          git push
